name: Build Executable
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5  # Обновлено с v4

    - name: Set up Python
      uses: actions/setup-python@v6  # Обновлено с v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install pygame pyinstaller

    - name: Build EXE
      run: |
        pyinstaller --onefile --noconsole main.py

    - name: Prepare Archive
      run: |
        mkdir release
        xcopy /E /I resources release\resources
        copy dist\main.exe release\SuperMario.exe

    - name: Upload Artifact
      uses: actions/upload-artifact@v5  # Обновлено с v4
      with:
        name: SuperMario-Game
        path: release/
